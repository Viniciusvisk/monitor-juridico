name: Consulta sob demanda

on:
  workflow_dispatch:
    inputs:
      origem:
        description: "Quem pediu a consulta"
        required: false
        default: "manual"

jobs:
  consultar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependências Python
        run: pip install requests selenium webdriver-manager

      - name: Executar consulta e responder no WhatsApp
        env:
          ZAPI_INSTANCE: ${{ secrets.ZAPI_INSTANCE }}
          ZAPI_TOKEN: ${{ secrets.ZAPI_TOKEN }}
          ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
          NUMERO_WHATSAPP: ${{ secrets.NUMERO_WHATSAPP }}
          DATAJUD_KEY: ${{ secrets.DATAJUD_KEY }}
        run: python consultar_processo.py
